name: keyboard_size_peek
description: "Reports the keyboard's final height before the show/hide animation starts. Size bottom sheets and attachment panels without debounce magic."
version: 0.1.0
homepage: https://github.com/stojanovventures/keyboard_size_peek
repository: https://github.com/stojanovventures/keyboard_size_peek
issue_tracker: https://github.com/stojanovventures/keyboard_size_peek/issues

environment:
  sdk: ^3.11.4
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.stojanovventures.keyboard_size_peek
        pluginClass: KeyboardSizePeekPlugin
      ios:
        pluginClass: KeyboardSizePeekPlugin
